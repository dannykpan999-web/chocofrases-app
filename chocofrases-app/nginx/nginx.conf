events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain application/json application/javascript text/css;

  # Rate limit zone
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  # ── API backend ──────────────────────────────────────────────
  server {
    listen 80;
    server_name api.YOURDOMAIN.com.ar;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name api.YOURDOMAIN.com.ar;

    ssl_certificate     /etc/letsencrypt/live/api.YOURDOMAIN.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOURDOMAIN.com.ar/privkey.pem;

    location /webhooks/ {
      proxy_pass         http://backend:3001;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://backend:3001;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass         http://backend:3001;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
    }
  }

  # ── Dashboard ────────────────────────────────────────────────
  server {
    listen 80;
    server_name panel.YOURDOMAIN.com.ar;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    server_name panel.YOURDOMAIN.com.ar;

    ssl_certificate     /etc/letsencrypt/live/panel.YOURDOMAIN.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.YOURDOMAIN.com.ar/privkey.pem;

    location / {
      proxy_pass http://dashboard:80;
      proxy_set_header Host $host;
    }
  }

  # ── Landing page ─────────────────────────────────────────────
  server {
    listen 80;
    server_name YOURDOMAIN.com.ar www.YOURDOMAIN.com.ar;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://YOURDOMAIN.com.ar$request_uri; }
  }

  server {
    listen 443 ssl;
    server_name YOURDOMAIN.com.ar www.YOURDOMAIN.com.ar;

    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.com.ar/privkey.pem;

    location / {
      proxy_pass http://landing:3002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
