version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chocofrases_db
    restart: always
    environment:
      POSTGRES_DB: chocofrases
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chocofrases_net

  redis:
    image: redis:7-alpine
    container_name: chocofrases_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - chocofrases_net

  backend:
    build: ./backend
    container_name: chocofrases_api
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - chocofrases_net
    volumes:
      - ./backend:/app
      - /app/node_modules

  dashboard:
    build: ./dashboard
    container_name: chocofrases_dashboard
    restart: always
    networks:
      - chocofrases_net

  landing:
    build: ./landing
    container_name: chocofrases_landing
    restart: always
    networks:
      - chocofrases_net

  nginx:
    image: nginx:alpine
    container_name: chocofrases_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - dashboard
      - landing
    networks:
      - chocofrases_net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

networks:
  chocofrases_net:
    driver: bridge
